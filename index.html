function AnimatedNumber({ target, suffix }) {
  const [count, setCount] = useState(0);
  const ref = useRef(null);
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) setVisible(true); }, { threshold: 0.5 });
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);
  useEffect(() => {
    if (!visible) return;
    const num = parseInt(target.replace(/,/g, ""));
    const duration = 1500;
    const step = Math.ceil(num / (duration / 16));
    let current = 0;
    const timer = setInterval(() => {
      current += step;
      if (current >= num) { current = num; clearInterval(timer); }
      setCount(current);
    }, 16);
    return () => clearInterval(timer);
  }, [visible, target]);
  const formatted = count.toLocaleString();
  return <span ref={ref}>{formatted}{suffix}</span>;
}

/* === 행태 분석 트래커 === */
const PromoAnalytics = {
  events: [],
  track(eventType, slotId, extra) {
    const event = {
      type: eventType,
      slotId,
      timestamp: new Date().toISOString(),
      page: window.location.pathname,
      ...extra,
    };
    this.events.push(event);
    console.log('[Promo Analytics]', eventType, slotId, extra || '');
    // dataLayer 푸시 (GTM/GA 연동용)
    if (window.dataLayer) {
      window.dataLayer.push({ event: 'promo_' + eventType, promo_slot: slotId, ...extra });
    }
  },
  trackView(slotId) { this.track('view', slotId); },
  trackClick(slotId, actionType) { this.track('click', slotId, { actionType }); },
  trackSubmit(slotId, resourceName) { this.track('submit', slotId, { resourceName }); },
};
window.dataLayer = window.dataLayer || [];

/* === 뷰 트래킹 훅 === */
function useViewTracking(slotId, active) {
  const ref = useRef(null);
  const tracked = useRef(false);
  useEffect(() => {
    if (!active || tracked.current || !ref.current) return;
    const obs = new IntersectionObserver(([e]) => {
      if (e.isIntersecting && !tracked.current) {
        tracked.current = true;
        PromoAnalytics.trackView(slotId);
      }
    }, { threshold: 0.3 });
    obs.observe(ref.current);
    return () => obs.disconnect();
  }, [slotId, active]);
  return ref;
}

function LeadCaptureModal({ config, onClose }) {
  const [lead, setLead] = useState({ company: '', name: '', email: '' });
  const [submitted, setSubmitted] = useState(false);
  const [submitting, setSubmitting] = useState(false);
  const canSubmit = lead.company && lead.name && lead.email;

  const handleSubmit = () => {
    if (!canSubmit) return;
    setSubmitting(true);
    PromoAnalytics.trackSubmit(config.slotId, config.resourceName);
    // API로 리드 데이터 전송
    fetch('/api/lead', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        company: lead.company,
        name: lead.name,
        email: lead.email,
        resource: config.resourceName,
        slotId: config.slotId,
        timestamp: new Date().toISOString(),
      }),
    })
      .then(r => r.json())
      .then(() => { setSubmitting(false); setSubmitted(true); })
      .catch(() => { setSubmitting(false); setSubmitted(true); }); // 에러 시에도 사용자에겐 완료 표시

                {config.resourceName}

                {config.resourceDesc}

                  <label style={{ fontSize: 13, fontWeight: 600, color: 'var(--color-label-neutral)', display: 'block', marginBottom: 6 }}>회사명 *</label>
                  <input className="lead-modal-input" placeholder="회사명을 입력해주세요" value={lead.company} onChange={e => setLead({...lead, company: e.target.value})} />
                </div>

                  <input className="lead-modal-input" placeholder="성함을 입력해주세요" value={lead.name} onChange={e => setLead({...lead, name: e.target.value})} />
                </div>
                <div>

              </button>

                입력하신 정보는 자료 발송 및 교육 상담 목적으로만 활용됩니다
              </p>
            </div>
          </>
        ) : (

            <h3 style={{ fontSize: 22, fontWeight: 800, color: 'var(--color-label-normal)', marginBottom: 12 }}>
