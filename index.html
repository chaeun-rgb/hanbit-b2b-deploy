function AnimatedNumber({ target, suffix }) {
  const [count, setCount] = useState(0);
  const ref = useRef(null);
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) setVisible(true); }, { threshold: 0.5 });
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);
  useEffect(() => {
    if (!visible) return;
    const num = parseInt(target.replace(/,/g, ""));
    const duration = 1500;
    const step = Math.ceil(num / (duration / 16));
    let current = 0;
    const timer = setInterval(() => {
      current += step;
      if (current >= num) { current = num; clearInterval(timer); }
      setCount(current);
    }, 16);
    return () => clearInterval(timer);
  }, [visible, target]);
  const formatted = count.toLocaleString();
  return <span ref={ref}>{formatted}{suffix}</span>;
}

/* === 행태 분석 트래커 === */
const PromoAnalytics = {
  events: [],
  track(eventType, slotId, extra) {
    const event = {
      type: eventType,
      slotId,
      timestamp: new Date().toISOString(),
      page: window.location.pathname,
      ...extra,
    };
    this.events.push(event);
    console.log('[Promo Analytics]', eventType, slotId, extra || '');
    // dataLayer 푸시 (GTM/GA 연동용)
    if (window.dataLayer) {
      window.dataLayer.push({ event: 'promo_' + eventType, promo_slot: slotId, ...extra });
    }
  },
  trackView(slotId) { this.track('view', slotId); },
  trackClick(slotId, actionType) { this.track('click', slotId, { actionType }); },
  trackSubmit(slotId, resourceName) { this.track('submit', slotId, { resourceName }); },
};
window.dataLayer = window.dataLayer || [];

/* === 뷰 트래킹 훅 === */
function useViewTracking(slotId, active) {
  const ref = useRef(null);
  const tracked = useRef(false);
  useEffect(() => {
    if (!active || tracked.current || !ref.current) return;
    const obs = new IntersectionObserver(([e]) => {
      if (e.isIntersecting && !tracked.current) {
        tracked.current = true;
        PromoAnalytics.trackView(slotId);
      }
    }, { threshold: 0.3 });
    obs.observe(ref.current);
    return () => obs.disconnect();
  }, [slotId, active]);
  return ref;
}

                <label style={{ fontSize: 13, fontWeight: 600, color: "rgba(255,255,255,0.5)", display: "block", marginBottom: 8 }}>연락처 (이메일 또는 전화) *</label>
                <input className="form-input" placeholder="email@company.com" value={formData.contact} onChange={e => setFormData({...formData, contact: e.target.value})} style={{ background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.12)", color: "var(--color-inverse-label)" }} />
              </div>
              <div>
                <label style={{ fontSize: 13, fontWeight: 600, color: "rgba(255,255,255,0.5)", display: "block", marginBottom: 8 }}>관심 교육 분야</label>
                <select className="form-input" value={formData.interest} onChange={e => setFormData({...formData, interest: e.target.value})} style={{ background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.12)", color: "var(--color-inverse-label)" }}>
                  <option value="AI/데이터">AI / 데이터</option>
                  <option value="개발/프로그래밍">개발 / 프로그래밍</option>
                  <option value="IT인프라/보안">IT인프라 / 보안</option>
                  <option value="AX전략/경영">AX전략 / 경영</option>
                  <option value="기타">기타 (상담 시 협의)</option>
                </select>
              </div>
            </div>
            <button className="cta-primary" style={{ width: "100%", padding: "18px", fontSize: 17, borderRadius: 14 }} onClick={() => alert("상담 신청이 접수되었습니다. 1영업일 이내 연락드리겠습니다.")}>
              무료 상담 신청하기
            </button>
            <div style={{ display: "flex", justifyContent: "center", gap: 32, marginTop: 28, flexWrap: "wrap" }}>
              <span style={{ fontSize: 13, color: "rgba(255,255,255,0.4)" }}>📞 02-336-7112</span>
              <span style={{ fontSize: 13, color: "rgba(255,255,255,0.4)" }}>✉ b2b@hanbit.co.kr</span>
            </div>
          </div>
        </div>
      </section>
      {/* === PROMO SLOT 3: COMPACT CTA === */}
      {(() => {
        const slot = getSlot('cta-banner');
        if (!slot) return null;
        return (
          <section className="promo-compact-cta" onClick={() => handlePromoClick(slot, slot.action)}
            style={{ padding: '40px 20px', background: 'var(--color-bg-alternative)' }}
          >
            <div className="promo-compact-inner" style={{
              maxWidth: 800, margin: '0 auto',
              display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexWrap: 'wrap', gap: 16,
              padding: '28px 36px', borderRadius: 16,
              background: 'var(--color-bg-normal)', border: '1.5px solid var(--color-line-normal)',
              boxShadow: '0 2px 12px rgba(0,0,0,0.04)',
              transition: 'all 0.3s ease'
            }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 16, flex: 1, minWidth: 200 }}>
                <div style={{ width: 44, height: 44, borderRadius: 12, background: 'var(--color-primary-tint)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 22, flexShrink: 0 }}>📬</div>
                <div>
                  <div style={{ fontSize: 16, fontWeight: 700, color: 'var(--color-label-normal)' }}>{slot.title}</div>
                  {slot.subtitle && <div style={{ fontSize: 13, color: 'var(--color-label-alternative)', marginTop: 4 }}>{slot.subtitle}</div>}
                </div>
              </div>
              <button className="promo-btn" style={{ background: 'var(--color-primary-normal)', color: '#fff', whiteSpace: 'nowrap', padding: '12px 28px', fontSize: 14 }}>
                {slot.buttonText} →
              </button>
            </div>
          </section>
        );
      })()}
      {/* === FAQ === */}
      <section style={{ padding: "100px 20px", maxWidth: 800, margin: "0 auto" }}>
        <h2 className="section-h2" style={{ fontWeight: 800, letterSpacing: -1, marginBottom: 48, textAlign: "center" }}>자주 묻는 질문</h2>
        {faqs.map((faq, i) => (
          <div key={i} className="faq-item" onClick={() => setOpenFaq(openFaq === i ? null : i)}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "24px 0" }}>
              <span className="faq-q" style={{ fontSize: 16, fontWeight: 600, transition: "color 0.2s", color: "var(--color-label-normal)" }}>{faq.q}</span>
              <span style={{ fontSize: 20, color: "var(--color-label-assistive)", transform: openFaq === i ? "rotate(45deg)" : "none", transition: "transform 0.3s" }}>+</span>
            </div>
            {openFaq === i && (
              <div style={{ paddingBottom: 24, fontSize: 15, color: "var(--color-label-alternative)", lineHeight: 1.7 }}>{faq.a}</div>
            )}
          </div>
        ))}
      </section>
      {/* === FINAL CTA === */}
      <section style={{ background: "var(--color-primary-normal)", padding: "80px 20px", textAlign: "center" }}>
        <h2 className="section-h2" style={{ fontWeight: 800, color: "var(--color-inverse-label)", letterSpacing: -0.5, marginBottom: 12 }}>
          AI 시대의 실무 러닝 허브
        </h2>
        <p style={{ color: "rgba(255,255,255,0.85)", fontSize: 16, marginBottom: 36 }}>
          비즈니스 결과와 귀사의 성장을 가장 중요한 가치로 믿습니다
        </p>
        <button className="cta-primary" onClick={() => scrollTo("문의하기")} style={{ background: "var(--color-bg-normal)", color: "var(--color-primary-heavy)" }}>
          기업교육 문의하기 →
        </button>
      </section>
      {/* === FOOTER === */}
      <footer style={{ background: "var(--color-inverse-bg)", padding: "48px 20px", textAlign: "center" }}>
        <p style={{ fontSize: 13, color: "rgba(255,255,255,0.3)", lineHeight: 2 }}>
          한빛앤(주) | 대표이사 임백준 | 서울 서대문구 연희로2길 62<br/>
          사업자등록번호 353-87-02918 | support@hanbit.co.kr<br/>
          © 2026 HanbitN Inc. All rights reserved.
        </p>
      </footer>
      {/* === LEAD CAPTURE MODAL === */}
      {modalConfig && (
        <LeadCaptureModal config={modalConfig} onClose={() => setModalConfig(null)} />
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<HanbitB2BPage />);
</script>
</body>
</html>
